<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clarity Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

  <div id="map"></div>
  <div id="layers-box">
    <button id="layers-header" onclick="toggleLayersBox()">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
      Layers<span id="layers-chevron">▾</span>
    </button>
    <div id="layers-panel">
      <label class="layer-row"><input type="checkbox" id="chk-clarity" checked onchange="toggleGrid()"> Clarity layer</label>
      <label class="layer-row"><input type="checkbox" id="chk-satellite" onchange="toggleSatellite()"> Satellite</label>
      <label class="layer-row"><input type="checkbox" id="chk-beaches" checked onchange="toggleBeaches()"> Beaches</label>
    </div>
  </div>

  <div id="left-panel">
    <div id="stats-bar">
      <div id="stats-label">Clarity today</div>
      <div id="stats-header-row">
        <div id="stats-value">—</div>
        <div id="stats-count"></div>
      </div>
      <div id="chart-panel">
        <canvas id="clarity-chart" height="80"></canvas>
      </div>
    </div>

    <div id="reports-filter">
      <div id="filter-label">Show reports <span id="filter-count"></span></div>
      <div id="stats-buttons">
        <button class="stats-btn" onclick="setWindow('today', this)">Today</button>
        <button class="stats-btn active" onclick="setWindow(24, this)">24h</button>
        <button class="stats-btn" onclick="setWindow(48, this)">48h</button>
        <button class="stats-btn" onclick="setWindow(168, this)">7d</button>
      </div>
    </div>

    <div id="clarity-legend">
      <div class="legend-title">Clarity</div>
      <div class="legend-inner">
        <div class="legend-bar"></div>
        <div class="legend-ticks">
          <span>20m</span>
          <span>15m</span>
          <span>10m</span>
          <span>5m</span>
          <span>0m</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

  <script>
  // ── Beach list (loaded from server) ──────────────────────────────────────────

  let BEACH_LIST = [];

  // ── Clarity colour helpers ────────────────────────────────────────────────────

  // Clarity gradient: original blue palette compressed to 0–20m; anything above 20m clamps to near-white
  const CLARITY_STOPS = [
    { v:  0, r:  65, g:  30, b:  10 },
    { v:  2.5, r:  10, g:  25, b:  80 },
    { v:  7.5, r:  20, g:  80, b: 160 },
    { v: 10, r:  50, g: 140, b: 210 },
    { v: 15, r: 150, g: 210, b: 245 },
    { v: 20, r: 220, g: 240, b: 255 },
  ];

  function clarityRGB(m) {
    const clamped = Math.max(0, Math.min(m, 20));
    let lo = CLARITY_STOPS[0], hi = CLARITY_STOPS[CLARITY_STOPS.length - 1];
    for (let i = 0; i < CLARITY_STOPS.length - 1; i++) {
      if (clamped <= CLARITY_STOPS[i + 1].v) { lo = CLARITY_STOPS[i]; hi = CLARITY_STOPS[i + 1]; break; }
    }
    const t = hi.v === lo.v ? 0 : (clamped - lo.v) / (hi.v - lo.v);
    return {
      r: Math.round(lo.r + t * (hi.r - lo.r)),
      g: Math.round(lo.g + t * (hi.g - lo.g)),
      b: Math.round(lo.b + t * (hi.b - lo.b)),
    };
  }

  function clarityColor(m) {
    const { r, g, b } = clarityRGB(m);
    return `rgb(${r},${g},${b})`;
  }

  function clarityOpacity(m) {
    return 0.85 - (Math.min(m, 20) / 20) * 0.45;
  }

  // ── Map setup ─────────────────────────────────────────────────────────────────

  const map = L.map('map', {
    center: [32.5, 34.85],
    zoom: 9,
    maxBounds: [[28.5, 33.0], [34.5, 37.0]],
    maxBoundsViscosity: 0.8,
  });

  const govmapLayer = L.tileLayer('https://cdnil.govmap.gov.il/xyz/heb/{z}/{x}/{y}.png', {
    attribution: '© מפת ישראל - govmap.gov.il',
    maxZoom: 18,
  });

  const satelliteLayer = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    {
      attribution: '© Esri, Maxar, Earthstar Geographics',
      maxZoom: 18,
    }
  );

  let satelliteVisible = false;
  govmapLayer.addTo(map);

  function toggleSatellite() {
    satelliteVisible = document.getElementById('chk-satellite').checked;
    if (satelliteVisible) {
      map.removeLayer(govmapLayer);
      satelliteLayer.addTo(map);
    } else {
      map.removeLayer(satelliteLayer);
      govmapLayer.addTo(map);
    }
  }

  const markersLayer = L.layerGroup().addTo(map);
  const beachLayer = L.layerGroup().addTo(map);
  let clarityLayerVisible = true;
  let beachesVisible = true;

  // ── Canvas-based IDW clarity layer ────────────────────────────────────────────

  const ClarityHeatLayer = L.Layer.extend({
    onAdd(map) {
      this._map = map;
      this._canvas = L.DomUtil.create('canvas', '', map.getPanes().overlayPane);
      this._canvas.style.cssText = 'pointer-events:none;opacity:0.55;filter:blur(8px)';
      if (!this._features) this._features = [];
      map.on('moveend zoomend resize', this._reset, this);
      this._reset();
    },
    onRemove(map) {
      this._canvas.remove();
      map.off('moveend zoomend resize', this._reset, this);
    },
    setFeatures(features) {
      this._features = features;
      if (this._map) this._reset();
    },
    setLandRings(rings) {
      this._landRings = rings;
    },
    _reset() {
      const map = this._map;
      const size = map.getSize();
      this._canvas.width  = size.x;
      this._canvas.height = size.y;
      // Position canvas so pixel (0,0) = container top-left, moves with overlayPane during pan
      const topLeft = map.containerPointToLayerPoint([0, 0]);
      L.DomUtil.setPosition(this._canvas, topLeft);
      this._draw();
    },
    _draw() {
      const map = this._map;
      const canvas = this._canvas;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const features = this._features;
      if (!features || !features.length) return;

      // Project reports to container pixels (aligns with canvas after setPosition)
      const reports = features.map(f => {
        const [lon, lat] = f.geometry.coordinates;
        const pt = map.latLngToContainerPoint(L.latLng(lat, lon));
        return { x: pt.x, y: pt.y, clarity: parseFloat(f.properties.clarity_m) || 0 };
      });

      // Influence radius: 25km in pixels
      const center = map.getCenter();
      const ptA = map.latLngToContainerPoint(L.latLng(center.lat - 0.5, center.lng));
      const ptB = map.latLngToContainerPoint(L.latLng(center.lat + 0.5, center.lng));
      const pxPer111km = Math.abs(ptA.y - ptB.y);
      const influenceR  = (25 / 111) * pxPer111km;
      const influenceR2 = influenceR * influenceR;

      const STEP = 4;
      const { width, height } = canvas;
      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;

      for (let py = 0; py < height; py += STEP) {
        for (let px = 0; px < width; px += STEP) {
          let wSum = 0, claritySum = 0;
          for (const r of reports) {
            const dx = px - r.x, dy = py - r.y;
            const d2 = dx * dx + dy * dy;
            if (d2 >= influenceR2) continue;
            const w = 1 - Math.sqrt(d2) / influenceR;
            wSum += w;
            claritySum += w * r.clarity;
          }
          if (wSum < 0.05) continue;

          const clarity = claritySum / wSum;
          const { r: rC, g: gC, b: bC } = clarityRGB(clarity);

          for (let oy = 0; oy < STEP && py + oy < height; oy++) {
            for (let ox = 0; ox < STEP && px + ox < width; ox++) {
              const i = ((py + oy) * width + (px + ox)) * 4;
              data[i] = rC; data[i+1] = gC; data[i+2] = bC; data[i+3] = 200;
            }
          }
        }
      }

      ctx.putImageData(imageData, 0, 0);

      // Erase land pixels using the coastline polygon
      if (this._landRings && this._landRings.length) {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = 'black';
        for (const ring of this._landRings) {
          ctx.beginPath();
          let first = true;
          for (const [lon, lat] of ring) {
            const pt = map.latLngToContainerPoint(L.latLng(lat, lon));
            if (first) { ctx.moveTo(pt.x, pt.y); first = false; }
            else ctx.lineTo(pt.x, pt.y);
          }
          ctx.closePath();
          ctx.fill();
        }
        ctx.globalCompositeOperation = 'source-over';
      }
    },
  });

  const clarityHeatLayer = new ClarityHeatLayer();

  // ── Report position state (updated when depth slider changes) ────────────────

  let reportLat = null, reportLon = null;
  let anchorLat = null, anchorLon = null;  // nearest beach coords
  let anchorBearing = null;                // bearing from beach → click point

  // Move a point from (lat,lon) along a bearing by distKm
  function destinationPoint(lat, lon, bearingDeg, distKm) {
    const R = 6371;
    const d = distKm / R;
    const b = bearingDeg * Math.PI / 180;
    const lat1 = lat * Math.PI / 180;
    const lon1 = lon * Math.PI / 180;
    const lat2 = Math.asin(Math.sin(lat1)*Math.cos(d) + Math.cos(lat1)*Math.sin(d)*Math.cos(b));
    const lon2 = lon1 + Math.atan2(Math.sin(b)*Math.sin(d)*Math.cos(lat1), Math.cos(d) - Math.sin(lat1)*Math.sin(lat2));
    return [lat2 * 180/Math.PI, lon2 * 180/Math.PI];
  }

  function bearingBetween(lat1, lon1, lat2, lon2) {
    const dLon = (lon2 - lon1) * Math.PI / 180;
    lat1 = lat1 * Math.PI / 180; lat2 = lat2 * Math.PI / 180;
    return Math.atan2(Math.sin(dLon)*Math.cos(lat2),
      Math.cos(lat1)*Math.sin(lat2) - Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon)) * 180/Math.PI;
  }

  function onDepthChange(newDepth) {
    document.getElementById('depth-val').textContent = newDepth;
    if (anchorLat == null || anchorBearing == null) return;
    const distKm = newDepth / 10;
    [reportLat, reportLon] = destinationPoint(anchorLat, anchorLon, anchorBearing, distKm);
    const coordEl = document.getElementById('form-coords');
    if (coordEl) coordEl.textContent = `${reportLat.toFixed(4)}°N ${reportLon.toFixed(4)}°E`;
  }

  // ── Build form HTML (injected into Leaflet popup) ─────────────────────────────

  function buildFormHTML(lat, lon, info) {
    const depthVal = Math.min(Math.round(info.depth_estimate || 0), 50);
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    const nowStr = now.toISOString().slice(0, 16);

    return `
    <div id="report-form">
      <div id="form-header">
        <span id="form-title">New Report</span>
        <span id="form-coords">${lat.toFixed(4)}°N ${lon.toFixed(4)}°E</span>
      </div>

      <input type="hidden" id="f-beach" value="${info.nearest_beach}">

      <label>Nickname
        <input type="text" id="f-username" maxlength="50" placeholder="Diving name">
      </label>

      <label>Date &amp; time
        <input type="datetime-local" id="f-datetime" value="${nowStr}" required>
      </label>

      <div class="sliders-row">
        <div class="slider-col">
          <span class="slider-label">Depth</span>
          <span class="slider-val" id="depth-val">${depthVal}</span>
          <span class="slider-unit">m</span>
          <div class="slider-track">
            <input type="range" class="vertical" id="f-depth"
                   min="0" max="50" step="1" value="${depthVal}"
                   oninput="onDepthChange(parseInt(this.value))">
          </div>
        </div>
        <div class="slider-col">
          <span class="slider-label">Clarity</span>
          <span class="slider-val" id="clarity-val">20</span>
          <span class="slider-unit">m</span>
          <div class="slider-track">
            <input type="range" class="vertical" id="f-clarity"
                   min="0" max="40" step="1" value="20"
                   oninput="document.getElementById('clarity-val').textContent = this.value">
            <div class="clarity-bar-v"></div>
          </div>
        </div>
      </div>

      <button id="submit-btn" onclick="submitReport()">Submit report</button>
      <p id="form-error" class="error hidden"></p>
    </div>`;
  }

  // ── Map click → open popup form ───────────────────────────────────────────────

  function hideOverlays() {
    document.getElementById('left-panel').style.visibility = 'hidden';
    document.getElementById('layers-box').style.visibility = 'hidden';
  }

  function showOverlays() {
    document.getElementById('left-panel').style.visibility = '';
    document.getElementById('layers-box').style.visibility = '';
  }

  let reportPopup = null;

  map.on('popupclose', (e) => {
    if (reportPopup && e.popup === reportPopup) {
      showOverlays();
      reportPopup = null;
    }
  });

  async function openReportForm(lat, lng, skipSeaCheck = false) {
    const res = await fetch(`/api/geo-info?lat=${lat}&lon=${lng}`);
    const info = await res.json();

    if (!skipSeaCheck && !info.is_sea) {
      showToast('Please click on the sea to add a report.');
      return;
    }

    map.closePopup();
    hideOverlays();

    reportLat = lat;
    reportLon = lng;
    anchorLat = info.nearest_beach_lat;
    anchorLon = info.nearest_beach_lon;
    const samePoint = Math.abs(lat - anchorLat) < 1e-6 && Math.abs(lng - anchorLon) < 1e-6;
    anchorBearing = samePoint ? 270 : bearingBetween(anchorLat, anchorLon, lat, lng);

    if (reportPopup) reportPopup.remove();

    // Anchor the popup 220px below the click in screen space so the box
    // opens southward and stays fully visible near the northern coast
    const clickPx = map.project(L.latLng(lat, lng));
    clickPx.y += 220;
    const popupLatLng = map.unproject(clickPx);

    reportPopup = L.popup({
      className: 'report-popup',
      maxWidth: 320,
      closeButton: true,
      autoClose: false,
      closeOnClick: false,
      autoPan: true,
      autoPanPaddingTopLeft: [10, 10],
      autoPanPaddingBottomRight: [10, 10],
    })
    .setLatLng(popupLatLng)
    .setContent(buildFormHTML(lat, lng, info))
    .openOn(map);
    onDepthChange(Math.min(Math.round(info.depth_estimate || 0), 50));
  }

  window.openReportForm = openReportForm;

  map.on('click', async (e) => {
    const {lat, lng} = e.latlng;
    await openReportForm(lat, lng);
  });

  // ── Submit ────────────────────────────────────────────────────────────────────

  async function submitReport() {
    const lat = reportLat, lon = reportLon;
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    if (!lat || !lon) {
      showFormError('No location — click on the sea first');
      btn.disabled = false;
      btn.textContent = 'Submit report';
      return;
    }

    const payload = {
      username:      document.getElementById('f-username').value.trim(),
      dive_datetime: document.getElementById('f-datetime').value,
      clarity_m:     parseFloat(document.getElementById('f-clarity').value),
      beach:         document.getElementById('f-beach').value,
      depth_m:       parseFloat(document.getElementById('f-depth').value),
      lat, lon,
    };

    if (new Date(payload.dive_datetime) > new Date()) {
      showFormError('Dive time cannot be in the future');
      btn.disabled = false;
      btn.textContent = 'Submit report';
      return;
    }

    try {
      const res = await fetch('/api/report', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload),
      });
      if (!res.ok) {
        const err = await res.json();
        showFormError(err.detail || 'Submission failed');
        btn.disabled = false;
        btn.textContent = 'Submit report';
      } else {
        const data = await res.json();
        if (data.delete_token && data.submitted_at) {
          const tokens = JSON.parse(localStorage.getItem('clarity_tokens') || '{}');
          tokens[data.submitted_at] = data.delete_token;
          localStorage.setItem('clarity_tokens', JSON.stringify(tokens));
        }
        if (reportPopup) { reportPopup.remove(); reportPopup = null; }
        const rRes = await fetch('/api/reports');
        allFeatures = (await rRes.json()).features;
        applyWindow(currentWindow);
        updateTodayStats();
        renderDailyChart();
      }
    } catch {
      showFormError('Network error — please try again');
      btn.disabled = false;
      btn.textContent = 'Submit report';
    }
  }

  function showFormError(msg) {
    const el = document.getElementById('form-error');
    if (el) { el.textContent = msg; el.classList.remove('hidden'); }
  }

  async function deleteReport(submittedAt) {
    const tokens = JSON.parse(localStorage.getItem('clarity_tokens') || '{}');
    const token = tokens[submittedAt];
    if (!token) return;
    const res = await fetch(`/api/report?submitted_at=${encodeURIComponent(submittedAt)}&token=${encodeURIComponent(token)}`, {
      method: 'DELETE',
    });
    if (res.ok) {
      delete tokens[submittedAt];
      localStorage.setItem('clarity_tokens', JSON.stringify(tokens));
      map.closePopup();
      const rRes = await fetch('/api/reports');
      allFeatures = (await rRes.json()).features;
      applyWindow(currentWindow);
      updateTodayStats();
      renderDailyChart();
    } else {
      alert('Could not delete report.');
    }
  }

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }

  // ── Load and display reports ──────────────────────────────────────────────────

  let allFeatures = [];
  let currentFiltered = [];
  let currentWindow = 24;

  async function loadReports() {
    const res = await fetch('/api/reports');
    const geojson = await res.json();
    allFeatures = geojson.features;
    applyWindow(currentWindow);
    updateTodayStats();
    renderDailyChart();
  }

  function getCutoff(window) {
    if (window === 'today') {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      return d;
    }
    return new Date(Date.now() - window * 3600 * 1000);
  }

  function applyWindow(window) {
    const cutoff = getCutoff(window);
    const filtered = allFeatures.filter(f => {
      const dt = f.properties.dive_datetime;
      return dt && new Date(dt) >= cutoff;
    });
    currentFiltered = filtered;

    const myTokens = JSON.parse(localStorage.getItem('clarity_tokens') || '{}');
    markersLayer.clearLayers();
    filtered.forEach(f => {
      const [lon, lat] = f.geometry.coordinates;
      const p = f.properties;
      const clarity = parseFloat(p.clarity_m) || 0;
      const canDelete = p.submitted_at && myTokens[p.submitted_at];
      L.circleMarker([lat, lon], {
        radius: 8,
        color: clarityColor(clarity),
        fillColor: clarityColor(clarity),
        fillOpacity: clarityOpacity(clarity),
        weight: 1.5,
      })
      .bindPopup(`
        <b>${p.beach}</b><br>
        Clarity: <b>${clarity} m</b><br>
        Depth: ${p.depth_m} m<br>
        Diver: ${p.username}<br>
        ${p.dive_datetime ? p.dive_datetime.split('T')[1]?.slice(0, 5) ?? p.dive_datetime : ''}
        ${canDelete ? `<br><button onclick="deleteReport('${p.submitted_at}')" style="margin-top:6px;font-size:0.75rem;color:#c0392b;background:none;border:1px solid #c0392b;border-radius:4px;padding:2px 8px;cursor:pointer;">Delete my report</button>` : ''}
      `)
      .addTo(markersLayer);
    });

    const countEl = document.getElementById('filter-count');
    if (countEl) countEl.textContent = filtered.length ? `(${filtered.length})` : '';

    if (clarityLayerVisible) clarityHeatLayer.setFeatures(filtered);
  }

  function updateTodayStats() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);

    const todayFeatures = allFeatures.filter(f => {
      const dt = new Date(f.properties.dive_datetime);
      return dt >= today && dt < tomorrow;
    });

    const valEl   = document.getElementById('stats-value');
    const countEl = document.getElementById('stats-count');
    if (todayFeatures.length === 0) {
      valEl.textContent   = '—';
      countEl.textContent = 'No dives today';
    } else {
      const mean = todayFeatures.reduce((s, f) => s + (parseFloat(f.properties.clarity_m) || 0), 0) / todayFeatures.length;
      valEl.textContent   = `${mean.toFixed(1)} m`;
      countEl.textContent = `${todayFeatures.length} dive${todayFeatures.length !== 1 ? 's' : ''}`;
    }
  }

  function setWindow(window, btn) {
    currentWindow = window;
    document.querySelectorAll('.stats-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyWindow(window);
  }

  // ── 5-day clarity chart (always visible) ─────────────────────────────────────

  let clarityChart = null;

  function renderDailyChart() {
    const labels = [];
    const means  = [];
    const colors = [];

    for (let i = 4; i >= 0; i--) {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() - i);
      const next = new Date(d);
      next.setDate(next.getDate() + 1);

      const dayFeatures = allFeatures.filter(f => {
        const dt = new Date(f.properties.dive_datetime);
        return dt >= d && dt < next;
      });

      let label;
      if (i === 0) label = 'Today';
      else if (i === 1) label = 'Yesterday';
      else label = `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}`;
      labels.push(label);

      if (dayFeatures.length === 0) {
        means.push(null);
        colors.push('rgba(176, 207, 224, 0.35)');
      } else {
        const mean = dayFeatures.reduce((s, f) => s + (parseFloat(f.properties.clarity_m) || 0), 0) / dayFeatures.length;
        means.push(parseFloat(mean.toFixed(1)));
        colors.push(clarityColor(mean));
      }
    }

    const ctx = document.getElementById('clarity-chart').getContext('2d');
    if (clarityChart) clarityChart.destroy();
    const validMeans = means.filter(v => v !== null);
    const yMax = validMeans.length
      ? Math.ceil((Math.max(...validMeans) * 1.35) / 5) * 5
      : 20;

    clarityChart = new Chart(ctx, {
      plugins: [ChartDataLabels],
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: means,
          backgroundColor: colors,
          borderRadius: 4,
          borderSkipped: false,
        }],
      },
      options: {
        maintainAspectRatio: false,
        layout: { padding: { top: 12 } },
        plugins: {
          legend: { display: false },
          datalabels: {
            anchor: 'end',
            align: 'top',
            formatter: v => v === null ? '' : Math.round(v) + 'm',
            font: { size: 8, family: 'Inter', weight: '600' },
            color: '#1a4a6a',
            display: ctx => ctx.dataset.data[ctx.dataIndex] !== null,
          },
        },
        datasets: { bar: { barThickness: 14 } },
        scales: {
          x: { ticks: { font: { size: 7, family: 'Inter' }, color: '#4a7a9b' }, grid: { display: false } },
          y: { display: false, min: 0, suggestedMax: yMax },
        },
        animation: { duration: 300 },
      },
    });
  }

  // ── Clarity layer toggle ──────────────────────────────────────────────────────

  function toggleGrid() {
    clarityLayerVisible = document.getElementById('chk-clarity').checked;
    if (clarityLayerVisible) {
      clarityHeatLayer.setFeatures(currentFiltered);
      clarityHeatLayer.addTo(map);
    } else {
      map.removeLayer(clarityHeatLayer);
    }
  }

  // ── Beach markers ─────────────────────────────────────────────────────────────

  let beachChart = null;

  function beachChartData(beachName) {
    const labels = [], means = [], colors = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() - i);
      const next = new Date(d);
      next.setDate(next.getDate() + 1);

      const dayFeatures = allFeatures.filter(f => {
        const dt = new Date(f.properties.dive_datetime);
        return f.properties.beach === beachName && dt >= d && dt < next;
      });

      labels.push(d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric' }));
      if (dayFeatures.length === 0) {
        means.push(null);
        colors.push('rgba(176, 207, 224, 0.4)');
      } else {
        const mean = dayFeatures.reduce((s, f) => s + (parseFloat(f.properties.clarity_m) || 0), 0) / dayFeatures.length;
        means.push(parseFloat(mean.toFixed(1)));
        colors.push(clarityColor(mean));
      }
    }
    return { labels, means, colors };
  }

  function renderBeachMarkers() {
    beachLayer.clearLayers();
    BEACH_LIST.forEach(b => {
      const icon = L.divIcon({
        className: '',
        html: `<div style="
          background:#cc2200;color:white;
          border:2px solid white;border-radius:50% 50% 50% 0;
          transform:rotate(-45deg);width:16px;height:16px;
          box-shadow:0 2px 5px rgba(120,0,0,0.4);
        "></div>
        <div style="
          position:absolute;top:-2px;left:20px;
          white-space:nowrap;
          background:rgba(100,10,0,0.78);color:#ffe8e5;
          font-size:0.65rem;font-family:inherit;
          padding:2px 5px;border-radius:4px;pointer-events:none;
        ">${b.name}</div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 16],
      });

      const canvasId = `beach-chart-${b.name.replace(/\s+/g, '-')}`;
      const popup = L.popup({ maxWidth: 220, className: 'beach-chart-popup' })
        .setContent(`
          <div style="font-size:0.8rem;font-weight:600;color:#1a4a6a;margin-bottom:6px">${b.name}</div>
          <div style="font-size:0.65rem;color:#4a7a9b;margin-bottom:6px">Last 7 days — mean clarity</div>
          <canvas id="${canvasId}" width="190" height="110"></canvas>
          <button onclick="openReportForm(${b.lat}, ${b.lon}, true)" style="
            margin-top:10px;width:100%;padding:6px 0;
            background:#1a4a6a;color:white;border:none;border-radius:6px;
            font-size:0.75rem;font-family:inherit;cursor:pointer;
          ">Report Clarity</button>
        `);

      const marker = L.marker([b.lat, b.lon], { icon }).addTo(beachLayer);
      marker.bindPopup(popup);

      marker.on('popupopen', () => {
        const { labels, means, colors } = beachChartData(b.name);
        const ctx = document.getElementById(canvasId).getContext('2d');
        if (beachChart) beachChart.destroy();
        const validMeans = means.filter(v => v !== null);
        const yMax = validMeans.length
          ? Math.ceil((Math.max(...validMeans) * 1.2) / 5) * 5
          : 20;
        beachChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels,
            datasets: [{ data: means, backgroundColor: colors, borderRadius: 3, borderSkipped: false }],
          },
          options: {
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { font: { size: 8, family: 'Inter' }, color: '#4a7a9b' }, grid: { display: false } },
              y: {
                min: 0, suggestedMax: yMax,
                ticks: { font: { size: 8, family: 'Inter' }, color: '#4a7a9b', callback: v => v + 'm' },
                grid: { color: 'rgba(176,207,224,0.3)' },
              },
            },
            animation: { duration: 200 },
          },
        });
      });
    });
  }

  function updateBeachVisibility() {
    const checkboxOn = document.getElementById('chk-beaches').checked;
    if (checkboxOn && map.getZoom() >= 10) {
      if (!map.hasLayer(beachLayer)) beachLayer.addTo(map);
    } else {
      if (map.hasLayer(beachLayer)) map.removeLayer(beachLayer);
    }
  }

  map.on('zoomend', updateBeachVisibility);

  function toggleBeaches() {
    beachesVisible = document.getElementById('chk-beaches').checked;
    updateBeachVisibility();
  }

  let layersOpen = false;
  function toggleLayersBox() {
    layersOpen = !layersOpen;
    document.getElementById('layers-panel').classList.toggle('open', layersOpen);
    document.getElementById('layers-chevron').textContent = layersOpen ? '▴' : '▾';
  }

  async function init() {
    const [beachRes, coastRes] = await Promise.all([
      fetch('/api/beaches'),
      fetch('/api/coastline'),
    ]);
    BEACH_LIST = await beachRes.json();
    renderBeachMarkers();

    // Extract land rings from coastline GeoJSON for canvas masking
    const coastGeo = await coastRes.json();
    const landRings = [];
    const features = coastGeo.type === 'FeatureCollection' ? coastGeo.features : [coastGeo];
    for (const feat of features) {
      const geom = feat.geometry || feat;
      if (geom.type === 'Polygon') {
        landRings.push(geom.coordinates[0]);  // exterior ring
      } else if (geom.type === 'MultiPolygon') {
        for (const poly of geom.coordinates) landRings.push(poly[0]);
      }
    }
    clarityHeatLayer.setLandRings(landRings);
    clarityHeatLayer.addTo(map);

    await loadReports();
  }

  init();
  </script>
